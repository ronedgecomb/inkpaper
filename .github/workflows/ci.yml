name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to validate before uploading distributions
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Locked quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.30"
          python-version: "3.14"
          enable-cache: true
      - name: Install locked project
        run: uv sync --locked
      - name: Lint
        run: uv run --locked ruff check .
      - name: Check formatting
        run: uv run --locked ruff format --check .
      - name: Test locked environment
        run: uv run --locked pytest -q

  compatibility:
    name: Gradio ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minimum-6.20.0
            gradio: gradio==6.20.0
          - name: newest-6.x
            gradio: gradio>=6.20,<7
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.30"
          python-version: "3.14"
          enable-cache: true
      - name: Test dependency boundary
        run: uv run --isolated --with "${{ matrix.gradio }}" --upgrade-package gradio pytest -q

  distributions:
    name: Build and validate distributions
    runs-on: ubuntu-latest
    needs: [quality, compatibility]
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.30"
          python-version: "3.14"
          enable-cache: true
      - name: Install locked project
        run: uv sync --locked
      - name: Validate release identity
        if: inputs.release_tag != ''
        run: uv run --locked python scripts/check_release.py "${{ inputs.release_tag }}"
      - name: Build distributions
        run: uv build --out-dir dist
      - name: Validate metadata
        run: uv run --locked twine check dist/*
      - name: Validate wheel contents
        run: uv run --locked check-wheel-contents dist/*.whl
      - name: Smoke test wheel and source distribution
        shell: bash
        run: |
          version="$(uv version --short)"
          uv run --no-project --isolated --with dist/*.whl python -I scripts/smoke_install.py "$version"
          uv run --no-project --isolated --with dist/*.tar.gz python -I scripts/smoke_install.py "$version"
      - name: Record checksums
        shell: bash
        run: |
          mkdir checksums
          sha256sum dist/* > checksums/SHA256SUMS
          cat checksums/SHA256SUMS
      - name: Upload verified release files
        if: inputs.release_tag != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inkpaper-distributions-${{ github.sha }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            checksums/SHA256SUMS
          if-no-files-found: error
          retention-days: 7
