name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    name: Verify release
    uses: ./.github/workflows/ci.yml
    with:
      release_tag: ${{ github.event.release.tag_name }}
    permissions:
      contents: read

  publish:
    name: Publish verified distributions to PyPI
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: pypi
      url: https://pypi.org/p/inkpaper
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: inkpaper-distributions-${{ github.sha }}
          path: release-artifacts
      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: release-artifacts/dist/
          attestations: true
          print-hash: true
